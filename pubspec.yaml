name: xue_hua_media_info
description: "Read image EXIF and video/audio metadata via nom-exif"
version: 1.1.1
homepage: https://github.com/Matkurban/xue_hua_media_info
repository: https://github.com/Matkurban/xue_hua_media_info
issue_tracker: https://github.com/Matkurban/xue_hua_media_info/issues
documentation: https://github.com/Matkurban/xue_hua_media_info/blob/main/README.md

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  freezed_annotation: ^3.1.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  build_runner: ^2.4.13
  ffi: ^2.1.3
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  integration_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
